name: Checks

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # shellcheck ships with ubuntu-latest runners.
      # Keep excludes in sync with .githooks/pre-commit.
      - name: Shellcheck
        run: |
          shellcheck --severity=warning --exclude=SC2034,SC1090 \
            $(git ls-files '*.sh') \
            install \
            .githooks/pre-commit

      - name: Test APT mirror configuration
        run: ./tests/test-apt-mirrors.sh

      - name: Test integration runner policy
        run: ./tests/test-integration-runner.sh

      - name: Test dotfile link state transitions
        run: ./tests/test-link-path.sh

      - name: Test macOS non-interactive install policy
        run: ./tests/test-easy-install-noninteractive.sh

      - name: Test Homebrew dependency resilience
        run: ./tests/test-brew-deps-resilience.sh

      - name: Test language dependency resilience
        run: ./tests/test-language-deps-resilience.sh

      - name: Test Yazi installer compatibility
        run: ./tests/test-yazi.sh

      - name: Test config against latest stable Yazi
        run: ./tests/test-yazi-config.sh

  macos-arm:
    name: macOS arm64 smoke
    # GitHub's macos-14 hosted image is Apple Silicon arm64.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Test Apple Bash to Homebrew Bash bootstrap
        run: /bin/bash ./tests/test-macos-arm.sh

      - name: Test dotfile links with macOS utilities
        run: /bin/bash ./tests/test-link-path.sh

  linux-integration:
    name: easy-install (${{ matrix.distro }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        distro: [debian, ubuntu, arch]
    steps:
      - uses: actions/checkout@v4

      - name: Run easy-install twice from a clean image
        env:
          APT_PRIMARY_MIRROR: ${{ matrix.distro == 'ubuntu' && 'http://azure.archive.ubuntu.com/ubuntu' || '' }}
          APT_SECURITY_MIRROR: ${{ matrix.distro == 'ubuntu' && 'http://azure.archive.ubuntu.com/ubuntu' || '' }}
        run: ./tests/integration/run.sh "${{ matrix.distro }}"
