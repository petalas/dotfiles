name: Checks

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # shellcheck ships with ubuntu-latest runners.
      # Keep excludes in sync with .githooks/pre-commit.
      - name: Shellcheck
        run: |
          shellcheck --severity=warning --exclude=SC2034,SC1090 \
            $(git ls-files '*.sh') \
            install \
            .githooks/pre-commit

  linux-integration:
    name: easy-install (${{ matrix.distro }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        distro: [debian, ubuntu, arch]
    steps:
      - uses: actions/checkout@v4

      - name: Run easy-install twice from a clean image
        run: ./tests/integration/run.sh "${{ matrix.distro }}"
