name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # shellcheck ships with ubuntu-latest runners.
      # Keep excludes in sync with .githooks/pre-commit.
      - name: Shellcheck
        run: |
          shellcheck --severity=warning --exclude=SC2034,SC1090 \
            $(git ls-files '*.sh') \
            install \
            .githooks/pre-commit
